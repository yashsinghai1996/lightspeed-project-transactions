name: dbt CI

on:
  pull_request:
    branches:
      - main

jobs:
  dbt-parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create dbt profile for CI
        run: |
          mkdir -p "$HOME/.dbt"
          cat > "$HOME/.dbt/profiles.yml" <<'EOF'
          lightspeed_project_transactions:
            outputs:
              ci:
                type: databricks
                catalog: dbt_transactions_lifecycle_dev
                schema: default
                host: dummy.cloud.databricks.com
                http_path: /sql/1.0/warehouses/dummy
                token: dummy-token
                threads: 1
            target: ci
          EOF

      - name: Install dbt packages
        working-directory: lightspeed_project_transactions
        run: dbt deps --profiles-dir "$HOME/.dbt"

      - name: Parse dbt project
        working-directory: lightspeed_project_transactions
        run: dbt parse --profiles-dir "$HOME/.dbt"
