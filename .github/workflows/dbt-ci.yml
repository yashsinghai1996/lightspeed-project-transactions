name: dbt CI

on:
  pull_request:
    branches:
      - main

jobs:
  dbt-parse:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create dbt profile for CI
        run: |
          mkdir -p "$HOME/.dbt"
          cat > "$HOME/.dbt/profiles.yml" <<EOF
          lightspeed_project_transactions:
            outputs:
              ci:
                type: databricks
                catalog: dbt_transactions_lifecycle_dev
                schema: default
                host: ${DATABRICKS_HOST:-dummy.cloud.databricks.com}
                http_path: ${DATABRICKS_HTTP_PATH:-/sql/1.0/warehouses/dummy}
                token: ${DATABRICKS_TOKEN:-dummy-token}
                threads: 1
            target: ci
          EOF

      - name: Install dbt packages
        working-directory: lightspeed_project_transactions
        run: dbt deps --profiles-dir "$HOME/.dbt"

      - name: Parse dbt project
        working-directory: lightspeed_project_transactions
        run: dbt parse --profiles-dir "$HOME/.dbt"

      - name: Build dbt project
        if: ${{ env.DATABRICKS_HOST != '' && env.DATABRICKS_HTTP_PATH != '' && env.DATABRICKS_TOKEN != '' }}
        working-directory: lightspeed_project_transactions
        run: dbt build --profiles-dir "$HOME/.dbt"
